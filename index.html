<!DOCTYPE html>
<html>
  <head>
    <title>Todo App</title>
    <link href="https://fonts.googleapis.com/css?family=Lato:300,400,700" rel="stylesheet">
    <link rel="stylesheet" href="style.css" media="screen" charset="utf-8">
  </head>
  <body class="body">
    <article class="pict-eisenhower-matrix">
      <img src="./eisenhower-matrix.jpg" alt="eisenhower matrix" class="eisenhower-matrix__img">
      <a class="pict-eisenhower-matrix__link" href="https://goal-life.com/page/method/matrix-eisenhower">Want more details?</a>
    </article>
    <main class="main">
      <section id="add-elem-to-list">
        <label for="new-task" class="add-elem__task-label">Add Item</label>
        <div class="add-item__task-row">
          <input id="new-task"class="task" type="text">
          <button class="add">Add</button>
        </div>
      </section>
      <section id="todo-list" class="todo-list">
        <h3 class="section-title">Todo</h3>
        <ul id="incomplete-tasks"  class="tasks">
          <li class="list__item">
            <input type="checkbox" class="checkbox">
            <label class="task task-info">Pay Bills</label>
            <input class="task" type="text">
            <button class="edit">Edit</button>
            <button class="delete">
              <img src="./remove.svg" alt="remove" class="delete__img">
            </button>
          </li>
          <li class="list__item list__item-edit">
            <input type="checkbox" class="checkbox">
            <label class="task task-info">Go Shopping</label>
            <input type="text" value="Go Shopping" class="task">
            <button class="edit">Save</button>
            <button class="delete">
              <img src="./remove.svg" alt="remove" class="delete__img">
            </button>
          </li>
        </ul>
      </section>
      <section>
        <h3 class="section-title">Completed</h3>
        <ul id="completed-tasks" class="tasks">
          <li class="list__item">
            <input type="checkbox" checked class="checkbox">
            <label class="task task-info">See the Doctor</label>
            <input type="text" class="task">
            <button class="edit">Edit</button>
            <button class="delete">
              <img src="./remove.svg" alt="remove" class="delete__img">
            </button>
          </li>
        </ul>
      </section>
    </main>
    <script src="app.js"></script>
  </body>
</html>
